body:
  text: 清嘉興仲之屏樹若甫纂註秀水沈浤㵎思甫校梓神僧傳載唐僧玄奘於貞觀間奉使詣西竺取諸經及圖像屆罽賓國道險難前見有老僧伽頭面瘡痏支牀獨坐謐如也奘知其有道遂拜禮於前冀有所示僧口授心經一卷令誦之得山川平易虎豹潛迹云摩訶者極大之稱心體寥廓四方上下所不能拘般若者心之智慧波羅者彼岸即涅槃也言其巨細該貫經緯分明蜜者包含萬法猶蜜之醞釀太和藏納萬卉也蜜未成則為華味有醎苦酸辜之別色有青黃赤白之殊到得成蜜眾味融為一味諸色化為一色菩薩以般若性調伏身心化眾習氣歸一圓通其恬適無異因般若乃六波羅蜜之大總持故曰多多者眾也一云波羅蜜三字相連西方樹名波羅蜜其果甘美食之能消一切苦一切即多義也般若是圓覺妙心故又直指為心經者常也此聖凡同具之常心故稱般若波羅蜜多心經觀自在菩薩行深般若波羅蜜多時自此至苦厄是阿難結集法藏時敘述觀自在菩薩度眾生之功行此是別序第一句是通篇總冐行深句申所修內觀之因照見句申所得自在之果度一切句申所證菩薩之位行深三句是通篇總承觀者覺也自則寂照自然在則如如不動覺而自在斯成菩薩自在菩薩人人皆是只因六根障蔽不能觀省萬情所牽不得自在若智慧人一心清淨靜觀本性覺自己斷絕法緣之菩薩優游自在矣故觀自在者能修般若之菩薩也般若波羅蜜多者菩薩所修之法也菩薩用般若觀慧照了圓融無礙故稱自在此自行也復閔在迷眾生令其修習此法改惡遷善離苦得樂無不自在此化行也菩薩者梵語菩提薩埵此言覺眾生有情但言菩薩者從略也行者修行深者幽微淵邈不可測識也深般若者實相般若菩薩諸行無不波羅蜜多綜貫萬善到徹底地位非粗心淺智者所觀時是見本性之時即古德所云忘忽憶夢忽醒之時也照見五蘊皆空度一切苦厄虗靈之極自然纖毫不眩照破種種愚癡故曰照見五蘊皆空照者觀也蘊者積聚凝結之謂五即下文色受想行識也五者蘊積不散能蔽真性惟菩薩能無時不照見任五蘊之因應往來無纖毫得而侵擾故曰皆空諸苦依蘊而生既無五蘊便出生死輪迴皆得解脫故曰度一切苦厄度者解脫也一切者眾也厄者窒礙不通之謂能度苦厄則行深之妙用矣舍利子舍利是佛之弟子智慧第一佛呼其名而告之舍如屋舍比四大五蘊色身利子者舍中之本來主張形骸者是也色不異空空不異色色即是空空即是色受想行識亦復如是此發明五蘊本空所以詳行深之義以應觀字意也凡有形者謂之色即六根之色六根中人易著相者色為甚故摘一色字反覆言之無形者謂之空勿謂我說空便向色外覔空其實色不異空也此句撥轉凡夫倒見言心不可著色也空不異色句喚醒二乘人偏見又不可著空也然不異之者難會色空之見猶存隨釋之曰色不異空者色即是空也空不異色者空即是色也知色空之不異而不著色又不著空一蘊既然受想行識亦如色空之不著也心所領納曰受思惟曰想造作曰行分別曰識此一經之要般若之心也舍利子是諸法空相不生不滅不垢不淨不增不減此菩薩復告舍利子也是諸法者指前五蘊而言推明真空本來無蘊也空本非相今因論諸法亦可借諸法之空以明相故曰空生乃無相之相也如此則非斷滅之空而為真空實相耳是真空實相中妙覺常通如如不動有何生滅一塵不染求其淨相尚不可得而況於污是無垢淨聖無所加愚無所損有何增減真空實相之體原如是耳若從色外覓空將不生即滅不滅即生不垢即淨不淨即垢不增即減不減即增矣豈所語於真空實相乎可見能空則眾生即是菩薩不能空則菩薩即是眾生也是故空中無色無受想行識此至無得見自初地至大乘皆當了此蘊空法以復真體葢詳申真空本來無蘊以應自在意也無即空也是故空中四字貫至亦無得句纔說色外無空世人又向空中覓色不知空中無色必掃盡一切方顯真空實相般若神通是故空中無色無受想行識五蘊空矣無眼耳鼻舌身意無色聲香味觸法凝而為六根則有眼耳等浮而為六塵則有色聲等而究之眼與色合耳與聲合鼻與香合舌與味合身與觸合意與法合觸即感觸法即籌畫心也無眼耳等六根空矣無色聲等六塵空矣此空十二入也入者六塵六識互涉入也無眼界乃至無意識界界境界也見到處為眼界分別是非處為意識界無界者不生於心之謂也既無十二入即無十八界則十八界空矣十八界者六根六塵六識也乃至者謂從此而登天堂往極樂其所造不可量也無無明亦無無明盡乃至無老死亦無老死盡性體湛然但因一念妄動迷於本性故爾癡愚無所明了入乘菩薩由是進緣覺乘不貪念嗔癡而無無明且并無無明之念而盡無之乃至無生死苦惱真性萬劫不磨而無老死且并無老死之念而盡無之則十二因緣空矣乃至者舉始末而略其中本性雖空而其間之層次非一也十二因緣與五蘊一義但略則為五詳則十二該三世因果展轉因依如輪旋轉無有休息也無苦集滅道既超生死并形體亦忘有甚苦集滅道苦謂生老病死諸苦果集謂貪嗔癡集聚惑業諸苦因二者世間法也滅謂滅盡貪欲生死諸苦即涅槃樂果道謂戒定慧及三十七道品是樂因二者出世間法也由是進聲聞乘而無知苦斷集慕滅修道空一切煩惱而得大自在也則四諦空矣無智亦無得由是入菩薩乘既無五蘊及四諦諸法可謂智矣而空則忘諸所有不自覺其為智是無智也到此境界行道而有得矣而空則仍是初體未嘗益所本無則又何所見為得耶以無所得故真空無相人法雙忘諦空俱遣欲求其故亦莫知其所以然何也自性本無物以無所得故也此結前真空無相又起後菩薩諸佛得果之文也菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃此與下段詳申度一切苦厄以智慧觀空到彼岸也菩薩之行不惟空有亦且空無不惟空妄究且空真是真行之深而為菩提薩埵矣菩提者覺也薩埵者有情也眾生皆有情惟菩薩在有情中覺悟者故云覺有情也薩埵是能依之人般若波羅蜜多是所依之法菩薩依此般若法門修學功成理足覺性波羅而圓通蜜多而曠達真空湛寂萬境自如以下推極言之也思惟不斷謂之罣著境不回謂之礙菩薩內外清淨諸緣洒脫心無業縛更何罣礙之有凡人憂恐驚怖皆緣有所執著罣礙既去則生死平等惡緣屏息復何有恐懼而怖畏乎夢因想生想因念起菩薩忘情絕愛永遠斷絕迷悟之顛倒妄憶之夢想而惡因盡矣窮盡寂靜常樂不生不滅之佛果豈不為大自在乎所謂度一切苦厄者如此三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提此波羅蜜多之法非惟菩薩如是修證而一切諸佛亦皆共由上文究竟涅槃即是佛乘佛性不二故過去現在未來三世諸佛無不依此般若法而修妙行洞見自性清淨證入真空得成無上正等正覺也菩薩舉涅槃諸佛舉菩提互文見意耳故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪呪真言也又祝願也所求皆遂其願也佛因眾生習氣深重不能頓除故假呪力令得解脫也夫菩薩之證涅槃諸佛之成正覺皆不外般若而修故知此般若波羅蜜多法門能破魔障是為大神呪謂變化莫測之真言也指前空五蘊言能滅癡暗是為大明呪謂照了諸妄之真言也指上無無明等言大者非小神小明者所可比也能顯至理最上一乘無可復加是名無上呪極妙覺果獨絕無倫是名無等等呪指上正等正覺言言大極矣重言無上等等深著般若溥博無際也此惟真空足以當之能除一切苦真實不虗此結般若功用廣大依此修行則永覺不迷能斷除一切煩惱生死及顛倒夢想等此真實不虗之語眾生當奉而行之也故說般若波羅蜜多呪即說呪曰故佛菩薩說此般若波羅蜜多乃是佛之密語非下凡所知呪願其類我佛菩薩說呪願諸眾生皆如我得成正覺呪即後四句偈也能誦此呪則所願無不成就也試以真言言之揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶呪語總收前文也揭者昭示諦者蘊義波羅彼岸也僧者身心清淨之義菩提者佛果薩婆訶即摩訶莫大之稱也謂全經之旨無非昭揭菩薩之諦義也昭揭菩薩之諦義也所以揭諦者何哉葢為彼岸而昭示佛諦也然此亦非名相可滯為到彼岸極清淨之地而揭其諦也由此而證佛果得菩提則菩薩莫大之境界又何可限量耶
