body:
  text: 心經注疏序佛祖西來不立文字云何唄梵之書富有五千蓋不立文字恐依藤附葛者一滋言詮便墮纏結昧却性宗其五千唄梵正大闡性宗斬絶藤葛要唄梵雖繁其指歸不外心經一集心經者誠諸經統會之源也其曰不生不滅言過去未來性固存存也不垢不淨言狂愚聖哲性自惺惺也不增不減言壽夭福極性本如如也奈彼蚓蚓不解無始本旨妄起生滅垢淨增減諸想由是五蘊六識顛倒于中則藤葛已甚纏結已劇欲證般若是猶南馳而北轅舍樹若仲子滙唄梵五千之旨全孕以經爰為注疏注者釋彼藤葛疏者解彼纏結試讀此編是即五千餘卷之要領不立文字之祕藏則知心經乃諸經之指歸而注疏又心經之指歸也具慧照者辨諸康熙十四年冬仲下浣今釋合十題
